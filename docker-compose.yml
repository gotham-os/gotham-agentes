version: "3.9"

# GOTHAM Agentes — stack completa
#
# Serviços:
#   brain     → FastAPI + AgentOS (porta 8000)
#   ui        → Next.js chat interface (porta 3000)
#   roteador  → Manifest LLM router (porta 2099) — controla custos
#
# Para rodar local (desenvolvimento):
#   docker compose up
#
# Para produção no Coolify: cada serviço é um app separado apontando para
# este docker-compose.yml. Ver docs/COOLIFY_DEPLOY.md.

services:

  brain:
    build:
      context: ./brain
      dockerfile: Dockerfile
    environment:
      - GOTHAM_DB_PATH=/data/gotham_memory.db
      - HOST=0.0.0.0
      - PORT=8000
      - MANIFEST_BASE_URL=${MANIFEST_BASE_URL}
      - MANIFEST_KEY_ALFRED=${MANIFEST_KEY_ALFRED}
      - MANIFEST_KEY_RAS=${MANIFEST_KEY_RAS}
      - MANIFEST_KEY_SELINA=${MANIFEST_KEY_SELINA}
      - MANIFEST_KEY_BRUCE=${MANIFEST_KEY_BRUCE}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - AGNO_API_KEY=${AGNO_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - brain-data:/data
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gotham-brain-http.entryPoints=http"
      - "traefik.http.routers.gotham-brain-http.middlewares=redirect-to-https"
      - "traefik.http.routers.gotham-brain-http.rule=Host(`brain.bmilimitada.com`)"
      - "traefik.http.routers.gotham-brain.entryPoints=https"
      - "traefik.http.routers.gotham-brain.rule=Host(`brain.bmilimitada.com`)"
      - "traefik.http.routers.gotham-brain.tls=true"
      - "traefik.http.routers.gotham-brain.tls.certresolver=letsencrypt"
      - "traefik.http.services.gotham-brain.loadbalancer.server.port=8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/agents')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        # Aponta para o brain (usa variável de ambiente do host para URL pública)
        NEXT_PUBLIC_AGNO_API_URL: ${BRAIN_PUBLIC_URL:-http://brain:8000}
    networks:
      - default
      - coolify
    environment:
      - NODE_ENV=production
    depends_on:
      brain:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gotham-ui-http.entryPoints=http"
      - "traefik.http.routers.gotham-ui-http.middlewares=redirect-to-https"
      - "traefik.http.routers.gotham-ui-http.rule=Host(`agents.bmilimitada.com`)"
      - "traefik.http.routers.gotham-ui.entryPoints=https"
      - "traefik.http.routers.gotham-ui.rule=Host(`agents.bmilimitada.com`)"
      - "traefik.http.routers.gotham-ui.tls=true"
      - "traefik.http.routers.gotham-ui.tls.certresolver=letsencrypt"
      - "traefik.http.services.gotham-ui.loadbalancer.server.port=3000"
    restart: unless-stopped

volumes:
  brain-data:
    driver: local

networks:
  default:
  coolify:
    external: true
